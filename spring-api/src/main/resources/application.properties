spring.application.name=spring-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/minerva?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jdmm123.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Excel Storage
eprofe.excel.storage-path=${EXCEL_STORAGE_PATH:./storage/excel}

# JWT Configuration
eprofe.jwt.secret=${JWT_SECRET:eProfeSecretKey2026ChangeMeInProduction}
eprofe.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
